[pytest]
testpaths = tests
addopts = --cov=. --cov-report=term-missing --cov-config=.coveragerc
markers =
    requires_tblite: test requires the tblite library (xTB backend)
    requires_openmm: test requires the openmm library (FF backend)
    requires_fakeredis: test requires the fakeredis library
    slow: long-running test (run on server, fine on Mac too)
    live: hits external backends end-to-end
filterwarnings =
    ignore::DeprecationWarning
