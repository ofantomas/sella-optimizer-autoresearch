specs:
  fitness:
    description: "Primary autoresearch score. Equal to mean_rel_steps for valid runs; lower is better. Invalid runs receive 1000.0."
    decimals: 6
    is_primary: true
    higher_is_better: false
    lower_bound: 0.0
    upper_bound: 5.0
    include_in_prompts: true
    significant_change: 0.01
    sentinel_value: 1000.0

  mean_rel_steps:
    description: "Mean ratio of rel_steps = n_force_calls / baseline_n_force_calls across all molecules. Lower is better."
    decimals: 6
    is_primary: false
    higher_is_better: false
    lower_bound: 0.0
    upper_bound: 5.0
    include_in_prompts: true
    significant_change: 0.01
    sentinel_value: 1000.0

  mean_rel_energy:
    description: "Mean ratio of rel_energy = (E_start - E_final) / (E_start - E_final_baseline) across all molecules. Must be >= 0.999 for a valid run."
    decimals: 6
    is_primary: false
    higher_is_better: true
    lower_bound: 0.999
    upper_bound: 1.5
    include_in_prompts: true
    significant_change: 0.001
    sentinel_value: -1.0

  converged:
    description: "Fraction of molecules where converged() returned True before the force-call budget was exhausted."
    decimals: 4
    is_primary: false
    higher_is_better: true
    lower_bound: 0.0
    upper_bound: 1.0
    include_in_prompts: true
    significant_change: 0.01
    sentinel_value: -1.0

  is_valid:
    description: "1 if the run has no errors, finite outputs, and mean_rel_energy >= 0.999; otherwise 0."
    decimals: 0
    is_primary: false
    higher_is_better: true
    lower_bound: 0.0
    upper_bound: 1.0
    include_in_prompts: true
    significant_change: 1.0
    sentinel_value: 0
